# Общий dev-compose для всей инфраструктуры.
#
# Запуск:
#   podman compose -f docker-compose-dev.yml up -d
# Остановка:
#   podman compose -f docker-compose-dev.yml down -v
#
# Порты на хосте:
#   api       -> 3000
#   streaming -> 8080
#   storage   -> 3002
#   postgres  -> 5432
#   redis     -> 6379
#   qdrant    -> 6333 / 6334
#   nats      -> 4222 (client) / 8222 (monitoring)

name: soundcloud-desktop-dev

services:
  db:
    image: docker.io/library/postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soundcloud
      POSTGRES_PASSWORD: soundcloud
      POSTGRES_DB: soundcloud_desktop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundcloud -d soundcloud_desktop"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"

  nats:
    image: docker.io/library/nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  streaming:
    build:
      context: ./streaming
      additional_contexts:
        tls-common: ./utils/tls-common
        call: ./utils/call
        decrypt: ./utils/decrypt
        decrypt-client: ./utils/decrypt-client
    restart: unless-stopped
    stop_grace_period: 3s
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: soundcloud
      DATABASE_PASSWORD: soundcloud
      DATABASE_NAME: soundcloud_desktop
      SC_PROXY_URL: ${SC_PROXY_URL:-}
      SC_PROXY_FALLBACK: ${SC_PROXY_FALLBACK:-false}
      SC_COOKIES: ${SC_COOKIES:-}
      PREMIUM_ONLY: ${PREMIUM_ONLY:-false}
      STORAGE_URL: http://storage:3000
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-http://localhost:3002}
      STORAGE_UPLOAD_URL: ${STORAGE_UPLOAD_URL:-}
      STORAGE_TOKEN: ${ADMIN_TOKEN:-dev}
      STORAGE_CLEANUP_DAYS: ${STORAGE_CLEANUP_DAYS:-7}
      STORAGE_MAX_SIZE_BYTES: ${STORAGE_MAX_SIZE_BYTES:-0}
      STORAGE_CLEANUP_INTERVAL_SECS: ${STORAGE_CLEANUP_INTERVAL_SECS:-3600}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal}
    depends_on:
      db:
        condition: service_healthy

  storage:
    build:
      context: ./storage
      additional_contexts:
        tls-common: ./utils/tls-common
    restart: unless-stopped
    stop_grace_period: 3s
    ports:
      - "3002:3000"
    environment:
      PORT: 3000
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_PATH: /data/storage
      TMP_PATH: /tmp/storage
      FFMPEG_BIN: ffmpeg
      FFPROBE_BIN: ffprobe
      MAX_TRANSCODES: ${MAX_TRANSCODES:-2}
      TRANSCODE_BATCH_SIZE: ${TRANSCODE_BATCH_SIZE:-8}
      TRANSCODE_BATCH_WAIT_MS: ${TRANSCODE_BATCH_WAIT_MS:-50}
      UPLOAD_CONCURRENCY: ${UPLOAD_CONCURRENCY:-64}
      UPLOAD_RETRIES: ${UPLOAD_RETRIES:-4}
      UPLOAD_RETRY_BASE_MS: ${UPLOAD_RETRY_BASE_MS:-250}
      RUST_LOG: storage=info
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      NATS_URL: nats://nats:4222
      EVENT_BASE_URL: ${EVENT_BASE_URL:-http://storage:3000}
    volumes:
      - storage_data:/data/storage
      - storage_tmp:/tmp/storage
    depends_on:
      nats:
        condition: service_healthy

  # Рутовый dev-compose рассчитан на GPU-хост. Если GPU нет — поменяй на worker/Dockerfile,
  # убери deploy.resources и выстави WORKER_DEVICE=cpu, WHISPER_COMPUTE=int8.
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.gpu
    restart: unless-stopped
    stop_grace_period: 8s
    environment:
      NATS_URL: nats://nats:4222
      MINI_MODEL: ${MINI_MODEL:-Qwen/Qwen3-1.7B}
      WHISPER_MODEL: ${WHISPER_MODEL:-medium}
      WHISPER_COMPUTE: ${WHISPER_COMPUTE:-float16}
      WORKER_DEVICE: ${WORKER_DEVICE:-cuda}
      DEMUCS_MODEL: ${DEMUCS_MODEL:-htdemucs}
      TASK_HARD_TIMEOUT_SEC: ${TASK_HARD_TIMEOUT_SEC:-120}
      TASK_HEARTBEAT_SEC: ${TASK_HEARTBEAT_SEC:-10}
    volumes:
      - models:/models
    command: ["python", "-m", "src.main"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started

  api:
    build:
      context: ./api
      additional_contexts:
        tls-common: ./utils/tls-common
        call: ./utils/call
    restart: unless-stopped
    stop_grace_period: 5s
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID}
      SOUNDCLOUD_CLIENT_SECRET: ${SOUNDCLOUD_CLIENT_SECRET}
      SOUNDCLOUD_REDIRECT_URI: ${SOUNDCLOUD_REDIRECT_URI:-http://localhost:3000/auth/callback}
      SC_PROXY_URL: ${SC_PROXY_URL:-}
      SC_PROXY_FALLBACK: ${SC_PROXY_FALLBACK:-false}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: soundcloud
      DATABASE_PASSWORD: soundcloud
      DATABASE_NAME: soundcloud_desktop
      STREAMING_SERVICE_URL: http://streaming:8080
      SUBSCRIPTIONS_SNAPSHOT_DIR: /snapshots
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev}
      QDRANT_URL: http://qdrant:6333
      NATS_URL: nats://nats:4222
      STORAGE_URL: http://storage:3000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal}
      REDIS_URL: redis://redis:6379
      SOUNDWAVE_AUDIO_WEIGHT: ${SOUNDWAVE_AUDIO_WEIGHT:-0.7}
      SOUNDWAVE_LYRICS_WEIGHT: ${SOUNDWAVE_LYRICS_WEIGHT:-0.3}
      GENIUS_ACCESS_TOKEN: ${GENIUS_ACCESS_TOKEN:-}
      RUST_LOG: ${RUST_LOG:-info,api=debug,tower_http=info,sqlx=warn}
    volumes:
      - api_snapshots:/snapshots
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      nats:
        condition: service_healthy
      streaming:
        condition: service_started
      storage:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_data:
  nats_data:
  storage_data:
  storage_tmp:
  models:
  api_snapshots:
