services:
  # Local filesystem backend — default.
  # Run: docker compose --profile local up -d
  storage-local:
    build:
      context: .
      additional_contexts:
        tls-common: ../utils/tls-common
    profiles: ["local"]
    restart: always
    ports:
      - "3002:3000"
    environment:
      STORAGE_BACKEND: local
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      STORAGE_PATH: /data/storage
      TMP_PATH: /tmp/storage
      MAX_TRANSCODES: ${MAX_TRANSCODES:-2}
      TRANSCODE_BATCH_SIZE: ${TRANSCODE_BATCH_SIZE:-8}
      TRANSCODE_BATCH_WAIT_MS: ${TRANSCODE_BATCH_WAIT_MS:-50}
      UPLOAD_CONCURRENCY: ${UPLOAD_CONCURRENCY:-64}
      UPLOAD_RETRIES: ${UPLOAD_RETRIES:-4}
      UPLOAD_RETRY_BASE_MS: ${UPLOAD_RETRY_BASE_MS:-250}
      NATS_URL: ${NATS_URL:-}
      EVENT_BASE_URL: ${EVENT_BASE_URL:-}
      RUST_LOG: storage=info
    volumes:
      - storage_data:/data/storage
      - ./tmp:/tmp/storage
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: 1G

  # S3 backend — uploads and reads go through S3.
  # GET /hq|/sq proxies bytes from S3 (never redirects) so the client
  # never hits the S3 host directly (useful when it's blocked by RKN).
  # Run: docker compose --profile s3 up -d
  storage-s3:
    build:
      context: .
      additional_contexts:
        tls-common: ../utils/tls-common
    profiles: ["s3"]
    restart: always
    ports:
      - "3002:3000"
    environment:
      STORAGE_BACKEND: s3
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      TMP_PATH: /tmp/storage
      MAX_TRANSCODES: ${MAX_TRANSCODES:-2}
      TRANSCODE_BATCH_SIZE: ${TRANSCODE_BATCH_SIZE:-8}
      TRANSCODE_BATCH_WAIT_MS: ${TRANSCODE_BATCH_WAIT_MS:-50}
      UPLOAD_CONCURRENCY: ${UPLOAD_CONCURRENCY:-64}
      UPLOAD_RETRIES: ${UPLOAD_RETRIES:-4}
      UPLOAD_RETRY_BASE_MS: ${UPLOAD_RETRY_BASE_MS:-250}
      RUST_LOG: storage=info
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      NATS_URL: ${NATS_URL:-}
      EVENT_BASE_URL: ${EVENT_BASE_URL:-}
    volumes:
      - ./tmp:/tmp/storage
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: 1G

volumes:
  storage_data:
