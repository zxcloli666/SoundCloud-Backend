name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_USER: scd
          POSTGRES_DB: scd
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd "pg_isready -U scd"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      # query_file! сверяются ONLINE с реальной схемой поднятой тест-БД. Без .sqlx.
      DATABASE_URL: postgres://scd:dev@localhost:5432/scd
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: api -> target
          key: api

      - name: Apply migrations (sqlx online check)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          for f in api/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"; done

      - name: Format check (warn only — does not fail CI)
        working-directory: api
        run: cargo fmt --check || echo "::warning title=rustfmt::api code differs from rustfmt — run 'cargo fmt'. Not blocking CI."

      - name: Clippy
        working-directory: api
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        working-directory: api
        run: cargo build --release

  # CI читает кэш с main, но НЕ пишет — иначе PR-билды затирают рабочий кэш.
  # cache-to остаётся только в auto-build.yml (release pipeline).
  storage:
    name: Storage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: storage
          build-contexts: |
            tls-common=utils/tls-common
          push: false
          load: true
          tags: soundcloud-backend-storage:ci
          cache-from: type=gha,scope=storage

  streaming:
    name: Streaming
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: streaming
          build-contexts: |
            tls-common=utils/tls-common
            call=utils/call
            decrypt=utils/decrypt
            decrypt-client=utils/decrypt-client
          push: false
          load: true
          tags: soundcloud-backend-streaming:ci
          cache-from: type=gha,scope=streaming

  worker:
    name: Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        working-directory: worker
        run: python -m compileall -q src

      - uses: docker/setup-buildx-action@v3

      # Кэш CPU-воркера лежит в GHCR registry (см. auto-build.yml).
      # Логин нужен для pull cache-образа; для PR из форков шаг тихо упадёт —
      # билд продолжится без кэша (allow-failure через continue-on-error).
      - name: Login to GHCR
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: worker
          push: false
          load: true
          tags: soundcloud-backend-worker:ci
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.owner }}/cache/scd-worker:cpu

  prod-guard:
    name: Prod / Guard PAT
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.c.outputs.ok }}
    steps:
      - id: c
        env:
          PAT: ${{ secrets.INTERNAL_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::INTERNAL_PAT not set — prod jobs skipped"
          fi

  prod-rust:
    name: Prod / Rust (real call)
    needs: prod-guard
    if: needs.prod-guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_USER: scd
          POSTGRES_DB: scd
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd "pg_isready -U scd"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgres://scd:dev@localhost:5432/scd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/SoundCloud-Internal
          token: ${{ secrets.INTERNAL_PAT }}
          path: _internal

      - name: Replace mock utils/call + utils/decrypt* with real
        run: |
          rm -rf utils/call utils/decrypt utils/decrypt-client
          cp -r _internal/call ./utils/call
          cp -r _internal/decrypt ./utils/decrypt
          cp -r _internal/decrypt-client ./utils/decrypt-client

      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y --no-install-recommends protobuf-compiler

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            api -> target
            streaming -> target
            utils/call -> target
          key: prod-rust

      - name: Apply migrations (sqlx online check)
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client
          for f in api/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"; done

      - run: cargo build --release --manifest-path api/Cargo.toml
      - run: cargo build --release --manifest-path streaming/Cargo.toml
      - run: cargo build --release --manifest-path utils/call/server/Cargo.toml
