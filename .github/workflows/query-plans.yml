name: query-plans
on:
  pull_request:
    paths:
      - 'api/queries/**'
      - 'api/migrations/**'
      - 'scripts/check-query-plans.sh'
  push:
    branches: [ main ]
    paths:
      - 'api/queries/**'
      - 'api/migrations/**'
      - 'scripts/check-query-plans.sh'

jobs:
  explain-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_USER: scd
          POSTGRES_DB: scd
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd "pg_isready -U scd"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgres://scd:dev@localhost:5432/scd
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y postgresql-client jq
      - name: apply schema
        run: for f in api/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"; done
      - name: warm planner stats (prod-like sizes)
        run: psql "$DATABASE_URL" -f scripts/load-approx-stats.sql
      - name: EXPLAIN gate (advisory — Seq Scan on big tables)
        continue-on-error: true
        run: bash scripts/check-query-plans.sh
