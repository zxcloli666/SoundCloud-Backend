name: migrations-guard
on:
  pull_request:
    paths: [ 'api/migrations/**' ]
  push:
    branches: [ main ]
    paths: [ 'api/migrations/**' ]
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: append-only + unique migrations
        env:
          # PR → base of the PR; push → commit before the push.
          MIG_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          BASE="$MIG_BASE_REF"
          # new ref / force-push reports all-zeros — fall back to the previous commit.
          case "$BASE" in ''|0000000000000000000000000000000000000000)
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)" ;;
          esac
          MIG_BASE_REF="$BASE" bash scripts/check-migrations.sh "$BASE...HEAD"
