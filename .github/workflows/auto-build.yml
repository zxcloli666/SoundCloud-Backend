name: Release

# Образы бэкенда в GHCR: ghcr.io/<owner>/soundcloud-backend/{api,streaming,storage,worker}
# Версия — semver git-тег vX.Y.Z (источник версии этого репо, без package.json).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: contains(github.event.head_commit.message, '!release') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version (services + git tag vX.Y.Z)
        id: bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION_INPUT: ${{ github.event.inputs.version_type }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${VERSION_INPUT:-patch}"
          else
            RELEASE_TYPE=$(echo "$COMMIT_MSG" | grep -oP '!release:\s*\K(major|minor|patch)' || echo "patch")
          fi

          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          LAST_VERSION=${LAST_TAG#v}
          LAST_VERSION=${LAST_VERSION:-0.0.0}
          IFS=. read -r MA MI PA <<< "$LAST_VERSION"

          case "$RELEASE_TYPE" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            *)     PA=$((PA + 1)) ;;
          esac
          NEW_VERSION="$MA.$MI.$PA"

          # Версия идёт в образ build-arg'ом APP_VERSION (Dockerfile вшивает её в
          # CARGO_PKG_VERSION на финальном компиле). Cargo.toml НЕ бампим — иначе
          # правка манифеста инвалидирует кэш слоя зависимостей. Источник версии — git-тег.
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  docker:
    needs: version
    runs-on: ubuntu-latest
    env:
      HAS_INTERNAL_PAT: ${{ secrets.INTERNAL_PAT != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: api
            file: ""
            extra_tags: ""
            cache_type: gha
            free_disk: false
            build_contexts: |
              tls-common=utils/tls-common
              call=utils/call
          - name: streaming
            context: streaming
            file: ""
            extra_tags: ""
            cache_type: gha
            free_disk: false
            build_contexts: |
              tls-common=utils/tls-common
              call=utils/call
              decrypt=utils/decrypt
              decrypt-client=utils/decrypt-client
          - name: storage
            context: storage
            file: ""
            extra_tags: ""
            cache_type: gha
            free_disk: false
            build_contexts: "tls-common=utils/tls-common"
          - name: worker
            context: worker
            file: worker/Dockerfile
            extra_tags: |
              ghcr.io/__REPO__/worker:__VERSION__-cpu
              ghcr.io/__REPO__/worker:cpu
            cache_type: registry-cpu
            free_disk: false
          - name: worker-gpu
            image_name: worker
            context: worker
            file: worker/Dockerfile.gpu
            tag_suffix: "-gpu"
            extra_tags: |
              ghcr.io/__REPO__/worker:gpu
            cache_type: registry-gpu
            free_disk: true
            no_default_tags: true
          - name: worker-gpu-cuda12
            image_name: worker
            context: worker
            file: worker/Dockerfile.gpu-cuda12
            tag_suffix: "-gpu-cuda12"
            extra_tags: |
              ghcr.io/__REPO__/worker:gpu-cuda12
            cache_type: registry-gpu-cuda12
            free_disk: true
            no_default_tags: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout internal repo (when PAT present, for api/streaming)
        if: ${{ env.HAS_INTERNAL_PAT == 'true' && (matrix.name == 'api' || matrix.name == 'streaming') }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/SoundCloud-Internal
          token: ${{ secrets.INTERNAL_PAT }}
          path: _internal

      - name: Replace mock crates with real
        if: ${{ env.HAS_INTERNAL_PAT == 'true' && (matrix.name == 'api' || matrix.name == 'streaming') }}
        env:
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          rm -rf utils/call
          cp -r _internal/call ./utils/call
          if [ "$MATRIX_NAME" = "streaming" ]; then
            rm -rf utils/decrypt utils/decrypt-client
            cp -r _internal/decrypt ./utils/decrypt
            cp -r _internal/decrypt-client ./utils/decrypt-client
          fi

      # Fail closed: never ship a prod api/streaming image built against the MOCK
      # call-relay. The mock's connect/call_method just return "call-relay disabled",
      # so the relay is a permanent no-op — every SC read silently falls back to
      # direct/proxy, the edge pool is unused and call_lua/control_sessions stay 0.
      # The mock has no server/ workspace and carries that marker string; the real
      # one (swapped above when INTERNAL_PAT is present) has neither.
      - name: Verify real call-relay is present
        if: ${{ matrix.name == 'api' || matrix.name == 'streaming' }}
        env:
          MATRIX_NAME: ${{ matrix.name }}
          HAS_PAT: ${{ env.HAS_INTERNAL_PAT }}
        run: |
          if [ ! -d utils/call/server ] || grep -q "call-relay disabled" utils/call/relay/src/lib.rs; then
            echo "::error::utils/call is still the MOCK relay — refusing to build a prod '$MATRIX_NAME' image."
            echo "::error::Real-relay swap was skipped: INTERNAL_PAT missing/expired (HAS_INTERNAL_PAT=$HAS_PAT)."
            echo "::error::Set a valid INTERNAL_PAT (read access to SoundCloud-Internal) and re-run this workflow."
            exit 1
          fi
          echo "real call-relay confirmed — utils/call/server present, no mock marker"

      # GPU-образ воркера съедает ~20 GB (CUDA base + torch CUDA wheels + bitsandbytes).
      # Стандартный runner даёт ~14 GB free — без этого шага падает на ENOSPC.
      - name: Free disk space
        if: matrix.free_disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false
          docker-images: false

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        env:
          REPO_RAW: ${{ github.repository }}
          OWNER_RAW: ${{ github.repository_owner }}
        run: |
          echo "name=$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo "$OWNER_RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute tags & cache
        id: meta
        env:
          REPO: ${{ steps.repo.outputs.name }}
          OWNER: ${{ steps.repo.outputs.owner }}
          VERSION: ${{ needs.version.outputs.version }}
          IMG: ${{ matrix.image_name || matrix.name }}
          SUFFIX: ${{ matrix.tag_suffix }}
          EXTRA: ${{ matrix.extra_tags }}
          CACHE: ${{ matrix.cache_type }}
          NO_DEFAULT: ${{ matrix.no_default_tags }}
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/$REPO/$IMG:$VERSION$SUFFIX"
            if [ "$NO_DEFAULT" != "true" ]; then
              echo "ghcr.io/$REPO/$IMG:latest"
            fi
            if [ -n "$EXTRA" ]; then
              echo "$EXTRA" | sed -e "s|__REPO__|$REPO|g" -e "s|__VERSION__|$VERSION|g"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          case "$CACHE" in
            gha)
              echo "cache_from=type=gha,scope=${{ matrix.name }}" >> "$GITHUB_OUTPUT"
              echo "cache_to=type=gha,mode=max,scope=${{ matrix.name }}" >> "$GITHUB_OUTPUT"
              ;;
            registry-cpu)
              echo "cache_from=type=registry,ref=ghcr.io/$OWNER/cache/scd-worker:cpu" >> "$GITHUB_OUTPUT"
              echo "cache_to=type=registry,ref=ghcr.io/$OWNER/cache/scd-worker:cpu,mode=max,image-manifest=true,oci-mediatypes=true" >> "$GITHUB_OUTPUT"
              ;;
            registry-gpu)
              echo "cache_from=type=registry,ref=ghcr.io/$OWNER/cache/scd-worker:gpu" >> "$GITHUB_OUTPUT"
              echo "cache_to=type=registry,ref=ghcr.io/$OWNER/cache/scd-worker:gpu,mode=max,image-manifest=true,oci-mediatypes=true" >> "$GITHUB_OUTPUT"
              ;;
            registry-gpu-cuda12)
              echo "cache_from=type=registry,ref=ghcr.io/$OWNER/cache/scd-worker:gpu-cuda12" >> "$GITHUB_OUTPUT"
              echo "cache_to=type=registry,ref=ghcr.io/$OWNER/cache/scd-worker:gpu-cuda12,mode=max,image-manifest=true,oci-mediatypes=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file || '' }}
          build-contexts: ${{ matrix.build_contexts || '' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          cache-from: ${{ steps.meta.outputs.cache_from }}
          cache-to: ${{ steps.meta.outputs.cache_to }}
