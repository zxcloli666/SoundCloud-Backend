name: Cache cleanup

# Чистит:
#   1. GHA-кэши закрытых/смерженных PR (они не нужны после мержа).
#   2. Кэши старше 14 дней с любых веток.
#
# GHA cache имеет лимит 10 GB на репо с LRU-eviction, но при активной
# разработке eviction выкидывает рабочий main-кэш. Эта чистка освобождает
# место предсказуемо.
#
# Реестр-кэш воркера (ghcr.io/<owner>/cache/scd-worker:{cpu,gpu,gpu-cuda12})
# сюда не входит — отдельный owner-scoped пакет, перезаписывается при каждом
# релизе и в лимит 10 GB не попадает.

on:
  schedule:
    - cron: "0 3 * * 0"  # каждое воскресенье в 03:00 UTC
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete caches for closed PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh extension install actions/gh-actions-cache || true
          PR_REF="refs/pull/${PR_NUMBER}/merge"
          echo "Deleting caches for $PR_REF"
          gh actions-cache list -R "$REPO" -B "$PR_REF" --limit 100 \
            | awk '{print $1}' \
            | while read -r key; do
                [ -z "$key" ] && continue
                gh actions-cache delete "$key" -R "$REPO" -B "$PR_REF" --confirm
              done

      - name: Delete caches older than 14 days
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CUTOFF=$(date -u -d '14 days ago' +%s)
          echo "Removing caches accessed before $(date -u -d "@$CUTOFF" -Iseconds)"
          PAGE=1
          while :; do
            BATCH=$(gh api "repos/$REPO/actions/caches?per_page=100&page=$PAGE")
            COUNT=$(echo "$BATCH" | jq '.actions_caches | length')
            [ "$COUNT" = "0" ] && break
            echo "$BATCH" | jq -r --argjson cutoff "$CUTOFF" \
              '.actions_caches[] | select((.last_accessed_at | fromdateiso8601) < $cutoff) | .id' \
              | while read -r id; do
                  [ -z "$id" ] && continue
                  echo "Deleting cache id=$id"
                  gh api -X DELETE "repos/$REPO/actions/caches/$id" >/dev/null
                done
            PAGE=$((PAGE + 1))
          done
